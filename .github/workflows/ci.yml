name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # --- Client CI ---
      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Run client lint
        run: |
          cd client
          npm run lint

      - name: Build client
        run: |
          cd client
          npm run build

      # --- Server CI ---
      - name: Install server dependencies
        run: |
          cd server
          npm ci

      - name: Run server tests
        env:
          MONGODB_URI: mongodb://localhost:27017/yojanatrack_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: testjwtsecretlongenoughforzodvalidation
          JWT_REFRESH_SECRET: testjwtrefreshsecretlongenoughforzodvalidation
          CLIENT_URL: http://localhost:5173
        run: |
          cd server
          npm run test

      - name: Build server
        run: |
          cd server
          npm run build
