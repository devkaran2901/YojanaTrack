name: Daily Tracker Deadline Check

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Enable manual run

jobs:
  check-deadlines:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Upcoming Deadlines Endpoint
        run: |
          echo "Checking upcoming application deadlines for users..."
          # In production, this workflow would trigger the backend to scan all users' upcoming deadlines 
          # and dispatch emails/notifications. For demonstration, we curl the endpoint.
          curl -s -X GET "https://api.yojanatrack.com/api/tracker/upcoming-deadlines" \
            -H "Authorization: Bearer ${{ secrets.SYSTEM_CRON_TOKEN }}" || echo "Endpoint pinged."
