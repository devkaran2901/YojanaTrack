version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: yojanatrack-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: yojanatrack-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: yojanatrack-server
    ports:
      - '5000:5000'
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/yojanatrack
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - NODE_ENV=development
      - JWT_SECRET=supersecretjwtkeyforlocaldev
      - JWT_REFRESH_SECRET=supersecretrefreshkeyforlocaldev
      - CLIENT_URL=http://localhost:5173
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: yojanatrack-client
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5000/api
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  mongodb_data:
  redis_data:
